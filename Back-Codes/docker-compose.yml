version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: loko-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Radman123
      MYSQL_DATABASE: loko
    ports:
      - "3307:3306"
    volumes:
      - loko_mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: loko-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - loko_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    container_name: loko-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs

volumes:
  loko_mysql_data:
  loko_redis_data: