# ============================================================
# LOKO Frontend - nginx config
# SPA serving + proxy /api و /uploads به بک‌اند
# ============================================================

upstream loko_api {
    server api:3000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # حداکثر حجم آپلود (ویدیو/پادکست)
    client_max_body_size 120m;

    # فشرده‌سازی
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ─── API → بک‌اند ───
    location /api/ {
        proxy_pass http://loko_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ─── فایل‌های آپلودی (مدیا) ───
    location /uploads/ {
        proxy_pass http://loko_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── health بک‌اند ───
    location = /health {
        proxy_pass http://loko_api/health;
    }

    # ─── فایل‌های استاتیک با کش طولانی ───
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── SPA fallback ───
    location / {
        try_files $uri $uri/ /index.html;
    }
}
