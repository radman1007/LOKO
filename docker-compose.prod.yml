# ============================================================
# LOKO Platform - Full-stack Production Compose
# سرویس‌ها: mysql, redis, api (Node), web (React+nginx)
# اجرا:  docker compose -f docker-compose.prod.yml up -d --build
# ============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: loko-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Radman123}
      MYSQL_DATABASE: ${DB_NAME:-loko}
    volumes:
      - loko_mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-Radman123}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [loko]

  redis:
    image: redis:7-alpine
    container_name: loko-redis
    restart: unless-stopped
    volumes:
      - loko_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [loko]

  api:
    build: ./Back-Codes
    container_name: loko-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AUTO_MIGRATE: "true"
      PORT: 3000
      API_VERSION: v1
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-Radman123}
      DB_NAME: ${DB_NAME:-loko}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_KEY_PREFIX: "loko:"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      # nginx جلوی همان دامنه قرار دارد؛ same-origin پس CORS لازم نیست، اما برای انعطاف:
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE_MB: 100
      MAX_EXCEL_SIZE_MB: 10
      MOOD_PROMPT_INTERVAL_HOURS: 4
      LOG_LEVEL: info
    volumes:
      - loko_uploads:/app/uploads
      - loko_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [loko]

  web:
    build: ./Front-Codes
    container_name: loko-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api
    networks: [loko]

volumes:
  loko_mysql_data:
  loko_redis_data:
  loko_uploads:
  loko_logs:

networks:
  loko:
    driver: bridge
